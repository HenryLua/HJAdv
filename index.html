<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:#F0EDE6;min-height:100vh;}
table{width:100%;border-collapse:collapse;}
input,select,textarea{font-family:'Segoe UI',sans-serif;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:#F0EDE6;}
::-webkit-scrollbar-thumb{background:#C9A84C;border-radius:3px;}
</style>
</head>
<body>
<div id="app"></div>
<script>

const API_URL="/api/ia";

// ═══ CONSTANTES VISUAIS ═══
const C={navy:"#0B1F3A",gold:"#C9A84C",gold3:"#a8872e",cream:"#F5F0E8",white:"#fff",gray:"#8A9BB0",gray2:"#E8EDF4",red:"#C0392B",green:"#1A7A4A",blue:"#2980B9",purple:"#8E44AD",orange:"#e67e22",text:"#1C2B3A"};
const AREAS=["Civil","Penal","Processual Civil","Processual Penal","Família","Trânsito","Trabalhista","Administrativo","Pareceres"];
const STATUS_PROC=["Em andamento","Aguardando audiência","Aguardando sentença","Recurso","Concluído","Arquivado"];
const TIPOS_FIN=["Honorários","Aporte","Pagamento Dativo","Nota Fiscal","Despesa","Outros"];
const LEGS=["Código Penal","Código de Processo Penal","Código Civil","Código de Processo Civil","CLT","Constituição Federal","ECA","CDC","Lei Maria da Penha","CTB"];
const DEF_DB={
  advogados:[],estagiarios:[],processos:[],prazos:[],juris:[],financeiro:[],degravacoes:[],acervo:[],acervSel:[],adminPass:"hjadv2025",escritorio:{},clientes:[]
};

// ═══ ESTADO GLOBAL ═══
let DB = {...DEF_DB};
let SESS = null; // {cliente_id, token, nome, email, validade, role}
let ABA = "dashboard";

// ═══ SESSÃO ═══
function getSessaoSalva(){
  try{ return JSON.parse(localStorage.getItem("hjadv_sess")||"null"); }catch{return null;}
}
function salvarSessao(sess){
  localStorage.setItem("hjadv_sess", JSON.stringify(sess));
}
function limparSessao(){
  localStorage.removeItem("hjadv_sess");
  SESS=null; DB={...DEF_DB};
}

// ═══ SAVE/LOAD DB (servidor) ═══
async function saveDB(){
  try{
    if(!SESS||!SESS.cliente_id||SESS.cliente_id==="master")return;
    await fetch("/api/dados",{
      method:"POST",
      headers:{"Content-Type":"application/json","cliente_id":SESS.cliente_id,"token":SESS.token},
      body:JSON.stringify({dados:DB})
    });
  }catch(e){console.warn("saveDB erro:",e);}
}
async function loadDB(){
  try{
    if(SESS.cliente_id==="master")return "ok";
    const r=await fetch("/api/dados",{headers:{"cliente_id":SESS.cliente_id,"token":SESS.token}});
    if(r.status===403){const d=await r.json();if(d.vencida)return "vencida";}
    if(!r.ok)return "erro";
    const d=await r.json();
    DB={...DEF_DB,...d.dados};
    return "ok";
  }catch(e){return "erro";}
}

function uid(){return Date.now()+Math.random().toString(36).slice(2,5);}
function fmtD(s){if(!s)return"";const p=s.split("-");return`${p[2]}/${p[1]}/${p[0]}`;}
function dias(s){return Math.ceil((new Date(s)-new Date())/(1000*60*60*24));}

function telaLogin(){
  const app=document.getElementById("app");
  app.innerHTML=`
  <div style="min-height:100vh;background:linear-gradient(135deg,#0B1F3A 0%,#1a3a5c 100%);display:flex;align-items:center;justify-content:center;padding:20px;">
    <div style="background:#fff;border-radius:16px;padding:40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.3);">
      <div style="text-align:center;margin-bottom:28px;">
        <div style="font-size:36px;margin-bottom:8px;">⚖️</div>
        <div style="font-size:22px;font-weight:800;color:#0B1F3A;">HJ ADV</div>
        <div style="font-size:12px;color:#8A9BB0;margin-top:3px;">Escritório Digital</div>
      </div>
      <div style="display:flex;gap:3px;background:#E8EDF4;border-radius:8px;padding:3px;margin-bottom:22px;">
        <button id="tab-login" style="flex:1;padding:8px;border-radius:6px;border:none;cursor:pointer;font-weight:700;font-size:12px;background:#fff;color:#0B1F3A;">Entrar</button>
        <button id="tab-ativar" style="flex:1;padding:8px;border-radius:6px;border:none;cursor:pointer;font-weight:700;font-size:12px;background:transparent;color:#8A9BB0;">Ativar Licença</button>
      </div>
      <div id="form-login">
        <div style="margin-bottom:14px;"><label style="display:block;font-size:11px;font-weight:700;color:#0B1F3A;margin-bottom:5px;text-transform:uppercase;letter-spacing:.8px;">E-mail</label><input id="lg-email" type="email" placeholder="seu@email.com.br" style="width:100%;padding:10px 12px;border:1.5px solid #E8EDF4;border-radius:8px;font-size:14px;outline:none;"/></div>
        <div style="margin-bottom:20px;"><label style="display:block;font-size:11px;font-weight:700;color:#0B1F3A;margin-bottom:5px;text-transform:uppercase;letter-spacing:.8px;">Senha</label><input id="lg-senha" type="password" placeholder="••••••••" style="width:100%;padding:10px 12px;border:1.5px solid #E8EDF4;border-radius:8px;font-size:14px;outline:none;"/></div>
        <button id="lg-btn" style="width:100%;padding:12px;background:#C9A84C;color:#0B1F3A;border:none;border-radius:8px;font-weight:800;font-size:15px;cursor:pointer;">Entrar</button>
        <div id="lg-err" style="margin-top:10px;font-size:12px;color:#C0392B;text-align:center;min-height:18px;"></div>
      </div>
      <div id="form-ativar" style="display:none;">
        <div style="background:rgba(201,168,76,.1);border-radius:8px;padding:12px;margin-bottom:16px;font-size:12px;color:#a8872e;line-height:1.6;">
          📦 Recebeu um código de ativação? Digite abaixo para criar sua conta.
        </div>
        <div style="margin-bottom:14px;"><label style="display:block;font-size:11px;font-weight:700;color:#0B1F3A;margin-bottom:5px;text-transform:uppercase;letter-spacing:.8px;">Código de Ativação</label><input id="at-codigo" placeholder="HJADV-XXXX-XXXX" style="width:100%;padding:10px 12px;border:1.5px solid #E8EDF4;border-radius:8px;font-size:14px;outline:none;text-transform:uppercase;letter-spacing:2px;"/></div>
        <button id="at-verificar" style="width:100%;padding:12px;background:#0B1F3A;color:#fff;border:none;border-radius:8px;font-weight:800;font-size:15px;cursor:pointer;">Verificar Código</button>
        <div id="at-err" style="margin-top:10px;font-size:12px;color:#C0392B;text-align:center;min-height:18px;"></div>
      </div>
      <div style="text-align:center;margin-top:18px;">
        <button id="btn-admin-acc" style="font-size:10px;color:#8A9BB0;background:none;border:none;cursor:pointer;text-decoration:underline;">Acesso admin</button>
      </div>
    </div>
  </div>`;

  let abaAtiva="login";
  document.getElementById("tab-login").onclick=()=>{abaAtiva="login";document.getElementById("form-login").style.display="";document.getElementById("form-ativar").style.display="none";document.getElementById("tab-login").style.background="#fff";document.getElementById("tab-login").style.color="#0B1F3A";document.getElementById("tab-ativar").style.background="transparent";document.getElementById("tab-ativar").style.color="#8A9BB0";};
  document.getElementById("tab-ativar").onclick=()=>{abaAtiva="ativar";document.getElementById("form-ativar").style.display="";document.getElementById("form-login").style.display="none";document.getElementById("tab-ativar").style.background="#fff";document.getElementById("tab-ativar").style.color="#0B1F3A";document.getElementById("tab-login").style.background="transparent";document.getElementById("tab-login").style.color="#8A9BB0";};

  document.getElementById("lg-btn").onclick=async()=>{
    const email=document.getElementById("lg-email").value.trim();
    const senha=document.getElementById("lg-senha").value;
    const err=document.getElementById("lg-err");
    if(!email||!senha){err.textContent="Preencha e-mail e senha.";return;}
    document.getElementById("lg-btn").textContent="Entrando...";
    try{
      // Tentar primeiro como admin master
      const rAdmin=await fetch("/api/admin/clientes",{headers:{"admin_email":email,"admin_senha":senha}});
      if(rAdmin.ok){
        // É o dono — entra com acesso master ao sistema
        SESS={cliente_id:"master",token:"master",nome:"Administrador",email:email,validade:null,role:"master",admin_email:email,admin_senha:senha};
        DB={...DEF_DB};
        salvarSessao(SESS);
        iniciarApp();
        return;
      }
      // Senão tentar como cliente normal
      const r=await fetch("/api/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email,senha})});
      const d=await r.json();
      if(!d.ok){err.textContent=d.error||"E-mail ou senha incorretos.";document.getElementById("lg-btn").textContent="Entrar";return;}
      SESS={cliente_id:d.cliente_id,token:d.token,nome:d.nome,email:d.email,validade:d.validade,role:"user"};
      salvarSessao(SESS);
      const status=await loadDB();
      if(status==="vencida"){limparSessao();err.textContent="Licença vencida. Entre em contato.";document.getElementById("lg-btn").textContent="Entrar";return;}
      iniciarApp();
    }catch(e){err.textContent="Erro de conexão.";document.getElementById("lg-btn").textContent="Entrar";}
  };

  document.getElementById("lg-senha").onkeydown=e=>{if(e.key==="Enter")document.getElementById("lg-btn").click();};

  document.getElementById("at-verificar").onclick=async()=>{
    const codigo=document.getElementById("at-codigo").value.trim().toUpperCase();
    const err=document.getElementById("at-err");
    if(!codigo){err.textContent="Digite o código.";return;}
    document.getElementById("at-verificar").textContent="Verificando...";
    try{
      const r=await fetch("/api/auth/verificar-codigo",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({codigo})});
      const d=await r.json();
      if(!d.ok){err.textContent=d.error||"Código inválido.";document.getElementById("at-verificar").textContent="Verificar Código";return;}
      if(d.tem_senha){err.style.color="#1A7A4A";err.textContent="Licença ativa! Use a aba Entrar com seu e-mail e senha.";document.getElementById("at-verificar").textContent="Verificar Código";return;}
      telaCriarSenha(codigo, d.nome, d.email);
    }catch(e){err.textContent="Erro de conexão.";document.getElementById("at-verificar").textContent="Verificar Código";}
  };

  document.getElementById("btn-admin-acc").onclick=()=>telaAdminLogin();

  // Tentar sessão salva
  const sess=getSessaoSalva();
  if(sess&&sess.cliente_id){
    SESS=sess;
    loadDB().then(status=>{
      if(status==="ok")iniciarApp();
      else{limparSessao();telaLogin();}
    });
  }
}

function telaCriarSenha(codigo, nome, email){
  const app=document.getElementById("app");
  app.innerHTML=`
  <div style="min-height:100vh;background:linear-gradient(135deg,#0B1F3A 0%,#1a3a5c 100%);display:flex;align-items:center;justify-content:center;padding:20px;">
    <div style="background:#fff;border-radius:16px;padding:40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.3);">
      <div style="text-align:center;margin-bottom:24px;">
        <div style="font-size:36px;margin-bottom:8px;">🎉</div>
        <div style="font-size:18px;font-weight:800;color:#0B1F3A;">Bem-vindo(a), ${nome}!</div>
        <div style="font-size:12px;color:#8A9BB0;margin-top:4px;">Crie sua senha para acessar o sistema</div>
      </div>
      <div style="background:#E8EDF4;border-radius:8px;padding:12px;margin-bottom:18px;font-size:12px;color:#0B1F3A;">
        📧 <strong>E-mail:</strong> ${email}
      </div>
      <div style="margin-bottom:14px;"><label style="display:block;font-size:11px;font-weight:700;color:#0B1F3A;margin-bottom:5px;text-transform:uppercase;">Nova Senha</label><input id="cs-senha1" type="password" placeholder="Mínimo 6 caracteres" style="width:100%;padding:10px 12px;border:1.5px solid #E8EDF4;border-radius:8px;font-size:14px;outline:none;"/></div>
      <div style="margin-bottom:20px;"><label style="display:block;font-size:11px;font-weight:700;color:#0B1F3A;margin-bottom:5px;text-transform:uppercase;">Confirmar Senha</label><input id="cs-senha2" type="password" placeholder="Repita a senha" style="width:100%;padding:10px 12px;border:1.5px solid #E8EDF4;border-radius:8px;font-size:14px;outline:none;"/></div>
      <button id="cs-btn" style="width:100%;padding:12px;background:#C9A84C;color:#0B1F3A;border:none;border-radius:8px;font-weight:800;font-size:15px;cursor:pointer;">Criar Senha e Entrar</button>
      <div id="cs-err" style="margin-top:10px;font-size:12px;color:#C0392B;text-align:center;min-height:18px;"></div>
    </div>
  </div>`;

  document.getElementById("cs-btn").onclick=async()=>{
    const s1=document.getElementById("cs-senha1").value;
    const s2=document.getElementById("cs-senha2").value;
    const err=document.getElementById("cs-err");
    if(!s1||!s2){err.textContent="Preencha os dois campos.";return;}
    if(s1!==s2){err.textContent="As senhas não coincidem.";return;}
    if(s1.length<6){err.textContent="Senha muito curta (mín. 6 caracteres).";return;}
    document.getElementById("cs-btn").textContent="Criando...";
    try{
      const r=await fetch("/api/auth/criar-senha",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({codigo,senha:s1})});
      const d=await r.json();
      if(!d.ok){err.textContent=d.error||"Erro ao criar senha.";document.getElementById("cs-btn").textContent="Criar Senha e Entrar";return;}
      // Login automático
      const r2=await fetch("/api/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email,senha:s1})});
      const d2=await r2.json();
      if(d2.ok){
        SESS={cliente_id:d2.cliente_id,token:d2.token,nome:d2.nome,email:d2.email,validade:d2.validade,role:"user"};
        salvarSessao(SESS);
        await loadDB();
        iniciarApp();
      }
    }catch(e){err.textContent="Erro de conexão.";document.getElementById("cs-btn").textContent="Criar Senha e Entrar";}
  };
}

  document.getElementById("adm-btn").onclick=async()=>{

      </div>

        </div>
        <div style="overflow-x:auto;">
          <table>

              ${clientes.length===0?`<tr><td colspan="6" style="padding:20px;text-align:center;color:#8A9BB0;font-size:12px;">Nenhum cliente cadastrado.</td></tr>`:""}

                const statusTxt=!c.ativo?"Inativo":vencida?"Vencida":"Ativo";
                const statusC=!c.ativo?"#C0392B":vencida?"#e67e22":"#1A7A4A";
                return `<tr style="border-bottom:1px solid #E8EDF4;background:${i%2===0?"#fff":"#fafbfd"};">
                  <td style="padding:10px 14px;font-size:13px;font-weight:600;">${c.nome}</td>

                  <td style="padding:10px 14px;"><span style="background:${statusC}18;color:${statusC};border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;">${statusTxt}</span></td>

                    <button data-renovar="${c.id}" style="padding:4px 9px;background:#1A7A4A18;color:#1A7A4A;border:1px solid #1A7A4A30;border-radius:6px;cursor:pointer;font-size:11px;">Renovar</button>

async function apiIA(system, messages){
  const headers = {"Content-Type":"application/json"};
  if(SESS&&SESS.cliente_id&&SESS.cliente_id!=="master"){
    headers["cliente_id"]=SESS.cliente_id;
    headers["token"]=SESS.token;
  } else if(SESS&&SESS.cliente_id==="master"){
    headers["cliente_id"]="master";
    headers["token"]="master";
    headers["admin_email"]=SESS.admin_email;
    headers["admin_senha"]=SESS.admin_senha;
  }
  const res = await fetch(API_URL, {
    method:"POST",
    headers,
    body:JSON.stringify({system, messages, max_tokens:2000})
  });
  const j = await res.json();
  if(j.error) throw new Error(j.error);
  return j.text;
}

function bindLogin(){
  const tentar=()=>{
    const u=document.getElementById("lu").value.trim().toLowerCase();
    const p=document.getElementById("lp").value;
    if(u==="admin"&&p===DB.adminPass){SESS={nome:"Administrador",role:"admin"};render();return;}
    const a=DB.advogados.find(x=>(x.login||"").toLowerCase()===u&&x.senha===p);
    if(a){SESS={nome:a.nome,role:"advogado"};render();return;}
    const e=DB.estagiarios.find(x=>(x.login||"").toLowerCase()===u&&x.senha===p);
    if(e){SESS={nome:e.nome,role:"estagiario"};render();return;}
    document.getElementById("lerr").style.display="block";
    setTimeout(()=>document.getElementById("lerr").style.display="none",3000);
  };
  document.getElementById("lbtn").onclick=tentar;
  document.getElementById("lp").onkeydown=e=>{if(e.key==="Enter")tentar();};
  document.getElementById("lu").onkeydown=e=>{if(e.key==="Enter")document.getElementById("lp").focus();};
}

    <div style="display:flex;gap:8px;justify-content:flex-end;">${btn("Cancelar","fpcancl","ghost")}${btn("Salvar","fpsave")}</div>`;
  openModal(modal("fproc",isNew?"Novo Processo":"Editar Processo",body,640));
  document.getElementById("fpcancl").onclick=()=>document.getElementById("fproc-overlay").remove();
  document.getElementById("fpsave").onclick=()=>{
    const cli=document.getElementById("fpcli").value;
    const num=document.getElementById("fpnum").value;
    if(!cli||!num)return alert("Cliente e número são obrigatórios.");
    const obj={id:p.id||uid(),cli,num,tip:document.getElementById("fptip").value,area:document.getElementById("fparea").value,status:document.getElementById("fpst").value,adv:document.getElementById("fpadv").value,valor:document.getElementById("fpval").value,trib:document.getElementById("fptrib").value,desc:document.getElementById("fpdesc").value};

function abrirEproc(cb){
  const body=`<p style="font-family:sans-serif;font-size:12px;color:${C.gray};margin-bottom:11px;line-height:1.6;">Cole o texto do andamento processual. A IA identifica o prazo e calcula a data limite.</p>
    <div style="margin-bottom:11px;"><textarea id="eptxt" rows="5" placeholder="Intimação para contestar no prazo de 15 dias..." style="width:100%;padding:8px 10px;border:1.5px solid ${C.gray2};border-radius:7px;font-size:12px;font-family:sans-serif;outline:none;resize:vertical;box-sizing:border-box;"></textarea></div>
    ${btn("Interpretar com IA","epinterp")}
    <div id="epres" style="display:none;background:${C.cream};border-radius:7px;padding:12px;margin-top:12px;"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:11px;">${btn("Cancelar","epcancl","ghost")}</div>`;
  openModal(modal("feproc","🤖 Interpretar eproc / esaj",body,580));
  document.getElementById("epcancl").onclick=()=>document.getElementById("feproc-overlay").remove();
  document.getElementById("epinterp").onclick=async()=>{
    const txt=document.getElementById("eptxt").value;if(!txt.trim())return;
    document.getElementById("epinterp").textContent="Interpretando...";
    try{
      const r=await apiIA("Analise o texto processual e retorne apenas JSON: {\"evento\":\"...\",\"prazo_dias\":N,\"data_limite\":\"YYYY-MM-DD\",\"prioridade\":\"Alta|Média|Baixa\",\"observacoes\":\"...\"}",
        [{role:"user",content:txt}]);
      const j=JSON.parse(r.replace(/```[a-z]*|```/g,"").trim());
      const epres=document.getElementById("epres");
      epres.style.display="block";
      epres.innerHTML=Object.entries(j).filter(([,v])=>v).map(([k,v])=>`<div style="margin-bottom:5px;"><span style="font-family:sans-serif;font-size:9px;font-weight:700;color:${C.gray};text-transform:uppercase;">${k.replace(/_/g," ")}: </span><span style="font-family:sans-serif;font-size:12px;">${v}</span></div>`).join("")+
        `<div style="margin-top:10px;">${btn("Usar estes dados","epusar")}</div>`;
      document.getElementById("epusar").onclick=()=>{document.getElementById("feproc-overlay").remove();abrirFormPrazoPreenchido(j,cb);};
    }catch(e){alert("Erro: "+e.message);}
    document.getElementById("epinterp").textContent="Interpretar com IA";
  };
}

      ${[...DB.degravacoes].reverse().slice(0,6).map(d=>`<div style="display:flex;align-items:center;gap:9px;padding:8px 11px;background:#fff;border-radius:7px;border:1px solid #E8EDF4;margin-bottom:4px;">

        document.getElementById("uploadorg").textContent="Processando...";

          document.getElementById("uploadout").textContent="⏳ Organizando com IA...";
          const prompt=`O conteúdo a seguir é uma transcrição extraída de um arquivo de mídia. Organize no formato de ${fmtP(fmt)}:\n\n${text.substring(0,8000)}`;

      document.getElementById("dvstart").onclick=()=>{

      };

let iaMsgs=[{r:"bot",t:"Olá! Sou o assistente jurídico do HJ ADV.\n\nTenho acesso a:\n• Legislação brasileira completa\n• Doutrina de referência (Nucci, Didier, Tartuce, Moraes e outros)\n• Súmulas do STF e STJ embutidas\n• Seu acervo próprio\n\nComo posso ajudar?"}];
let iaSelLeg=[],iaSelDout=[],iaSelSum=[];
function pgIA(el){
  function draw(){
    el.innerHTML=`
    <div style="margin-bottom:11px;"><h1 style="font-size:22px;color:${C.navy};">🤖 Assistente Jurídico</h1><p style="font-family:sans-serif;font-size:10px;color:${C.gray};margin-top:2px;">Legislação · Doutrina · Súmulas · Acervo próprio</p></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px;">
      ${card(`<div style="font-family:sans-serif;font-size:9px;font-weight:700;color:${C.navy};margin-bottom:5px;text-transform:uppercase;">📜 Legislação</div><div style="display:flex;flex-wrap:wrap;gap:3px;">${LEGS.map((l,i)=>ck(l,"ileg-"+i,iaSelLeg.includes(i))).join("")}</div>`)}
      ${card(`<div style="font-family:sans-serif;font-size:9px;font-weight:700;color:${C.navy};margin-bottom:5px;text-transform:uppercase;">📚 Doutrina</div><div style="display:flex;flex-wrap:wrap;gap:3px;">${DOUTS.map((d,i)=>ck(d,"idout-"+i,iaSelDout.includes(i))).join("")}</div>`)}
    </div>
    ${card(`<div style="font-family:sans-serif;font-size:9px;font-weight:700;color:${C.navy};margin-bottom:5px;text-transform:uppercase;">⚖️ Súmulas e Teses (offline)</div><div style="display:flex;flex-wrap:wrap;gap:3px;">${SUMS.map((s,i)=>ck(s,"isum-"+i,iaSelSum.includes(i))).join("")}</div>`,"margin-bottom:9px;")}
    <div style="border:1px solid ${C.gray2};border-radius:9px;overflow:hidden;">
      <div id="iachat" style="height:320px;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;">
        ${iaMsgs.map(m=>`<div style="max-width:83%;padding:8px 12px;border-radius:${m.r==="user"?"11px 11px 3px 11px":"11px 11px 11px 3px"};background:${m.r==="user"?C.navy:C.cream};color:${m.r==="user"?"#fff":C.text};font-family:sans-serif;font-size:12px;line-height:1.65;align-self:${m.r==="user"?"flex-end":"flex-start"};">${m.t.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>").replace(/\n/g,"<br/>")}</div>`).join("")}
      </div>
      <div style="padding:8px 10px;border-top:1px solid ${C.gray2};display:flex;gap:5px;">
        <input id="iainp" placeholder="Consulta jurídica... (Enter para enviar)" style="flex:1;padding:7px 10px;border:1.5px solid ${C.gray2};border-radius:7px;font-family:sans-serif;font-size:12px;outline:none;"/>
        <button id="iaclr" style="padding:6px 9px;border:1.5px solid ${C.gray2};border-radius:7px;background:transparent;cursor:pointer;font-size:11px;">🗑</button>
        ${btn("Enviar","iaenv")}
      </div>
    </div>`;
    const chat=document.getElementById("iachat");chat.scrollTop=chat.scrollHeight;
    document.querySelectorAll("[id^='ileg-']").forEach(el=>{el.onclick=()=>{const i=parseInt(el.id.replace("ileg-",""));iaSelLeg=iaSelLeg.includes(i)?iaSelLeg.filter(x=>x!==i):[...iaSelLeg,i];draw();};});
    document.querySelectorAll("[id^='idout-']").forEach(el=>{el.onclick=()=>{const i=parseInt(el.id.replace("idout-",""));iaSelDout=iaSelDout.includes(i)?iaSelDout.filter(x=>x!==i):[...iaSelDout,i];draw();};});
    document.querySelectorAll("[id^='isum-']").forEach(el=>{el.onclick=()=>{const i=parseInt(el.id.replace("isum-",""));iaSelSum=iaSelSum.includes(i)?iaSelSum.filter(x=>x!==i):[...iaSelSum,i];draw();};});
    document.getElementById("iaclr").onclick=()=>{iaMsgs=[{r:"bot",t:"Chat limpo. Como posso ajudar?"}];draw();};
    const enviar=async()=>{
      const txt=document.getElementById("iainp").value.trim();if(!txt)return;
      iaMsgs.push({r:"user",t:txt},{r:"bot",t:"⚙️ Consultando..."});
      document.getElementById("iainp").value="";draw();
      const legs=iaSelLeg.length?iaSelLeg.map(i=>LEGS[i]).join(", "):"toda a legislação brasileira";
      const douts=iaSelDout.length?iaSelDout.map(i=>DOUTS[i]).join(", "):"Nucci, Didier, Tartuce, Moraes";
      const sys=`Você é assistente jurídico do escritório HJ ADV (Rio Grande do Sul, Brasil). Responda em português.\nBase legal: ${legs}\nDoutrina: ${douts}\n${SSUM}${iaSelDout.length?"\n"+SDOUT:""}\nCite sempre o artigo específico da lei. Use **negrito** para pontos importantes.`;
      const hist=iaMsgs.filter(m=>m.t!=="⚙️ Consultando...").slice(0,-1).map(m=>({role:m.r==="user"?"user":"assistant",content:m.t}));
      try{const r=await apiIA(sys,[...hist,{role:"user",content:txt}]);iaMsgs[iaMsgs.length-1]={r:"bot",t:r};}
      catch(e){iaMsgs[iaMsgs.length-1]={r:"bot",t:"❌ Erro: "+e.message+"\n\nVerifique sua conexão e as configurações do servidor."};}
      draw();
    };
    document.getElementById("iaenv").onclick=enviar;
    document.getElementById("iainp").onkeydown=e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();enviar();}};
  }
  draw();
}
function ck(label,id,sel){return`<label id="${id}" style="display:flex;align-items:center;gap:3px;cursor:pointer;font-family:sans-serif;font-size:10px;padding:2px 6px;background:${sel?"rgba(201,168,76,.15)":C.gray2};border-radius:4px;border:${sel?`1px solid ${C.gold}`:"1px solid transparent"};color:${sel?C.navy:C.gray};font-weight:${sel?700:400};user-select:none;"><input type="checkbox" ${sel?"checked":""} style="pointer-events:none;accent-color:${C.gold};"/>${label}</label>`;}

function pgPecas(el){
  let area="Cível",busca="",pecaSel=null;
  function draw(){
    const lista=(PECAS_DB[area]||[]).filter(p=>!busca||p.tit.toLowerCase().includes(busca)||p.tags.some(t=>t.toLowerCase().includes(busca)));
    el.innerHTML=`
    <div style="margin-bottom:16px;">
      <h1 style="font-size:22px;color:${C.navy};">📄 Modelos de Peças Processuais</h1>
      <p style="font-family:sans-serif;font-size:11px;color:${C.gray};margin-top:2px;">Selecione, edite e copie o modelo</p>
    </div>
    <div style="display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap;">
      <input id="pbusca2" value="${busca}" placeholder="Buscar peça..." style="flex:1;min-width:150px;padding:7px 10px;border:1.5px solid ${C.gray2};border-radius:7px;font-family:sans-serif;font-size:12px;outline:none;"/>
      <div style="display:flex;gap:4px;flex-wrap:wrap;">
        ${Object.keys(PECAS_DB).map(a=>`<button data-area="${a}" style="font-family:sans-serif;font-size:11px;font-weight:${area===a?700:400};padding:5px 11px;border-radius:6px;border:${area===a?`2px solid ${C.gold}`:`1px solid ${C.gray2}`};background:${area===a?"rgba(201,168,76,.15)":"#fff"};color:${area===a?C.navy:C.gray};cursor:pointer;">${a}</button>`).join("")}
      </div>
    </div>
    <div style="display:grid;grid-template-columns:280px 1fr;gap:14px;">
      <div>
        ${lista.map(p=>`<div data-peca="${p.tit}" style="padding:11px 13px;background:${pecaSel===p.tit?"rgba(201,168,76,.12)":"#fff"};border:${pecaSel===p.tit?`2px solid ${C.gold}`:`1px solid ${C.gray2}`};border-radius:8px;cursor:pointer;margin-bottom:6px;">
          <div style="font-family:sans-serif;font-weight:600;font-size:13px;color:${C.navy};">${p.tit}</div>
          <div style="display:flex;gap:3px;margin-top:4px;flex-wrap:wrap;">${p.tags.map(t=>`<span style="background:${C.navy}10;color:${C.navy};border-radius:3px;padding:1px 5px;font-size:9px;font-family:sans-serif;">#${t}</span>`).join("")}</div>
        </div>`).join("")}
        ${lista.length===0?`<p style="font-family:sans-serif;font-size:12px;color:${C.gray};">Nenhum modelo encontrado.</p>`:""}
      </div>
      <div style="background:#fff;border-radius:11px;border:1px solid ${C.gray2};padding:18px;">
        ${pecaSel?(()=>{
          const p=(PECAS_DB[area]||[]).find(x=>x.tit===pecaSel);
          if(!p)return`<p style="font-family:sans-serif;color:${C.gray};">Selecione um modelo.</p>`;
          return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
            <div style="font-weight:700;font-size:15px;color:${C.navy};">${p.tit}</div>
            <div style="display:flex;gap:6px;">
              <button id="pccopy" style="padding:6px 12px;background:${C.navy};color:#fff;border:none;border-radius:7px;font-family:sans-serif;font-size:11px;font-weight:700;cursor:pointer;">📋 Copiar</button>
              <button id="pcgemia" style="padding:6px 12px;background:${C.gold};color:${C.navy};border:none;border-radius:7px;font-family:sans-serif;font-size:11px;font-weight:700;cursor:pointer;">🤖 Personalizar com IA</button>
            </div>
          </div>
          <textarea id="pcedit" rows="22" style="width:100%;padding:10px;border:1.5px solid ${C.gray2};border-radius:7px;font-size:12px;font-family:monospace;outline:none;resize:vertical;box-sizing:border-box;line-height:1.7;">${p.modelo}</textarea>`;
        })():`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;color:${C.gray};font-family:sans-serif;font-size:13px;"><span style="font-size:36px;margin-bottom:9px;">📄</span>Selecione um modelo à esquerda</div>`}
      </div>
    </div>`;
    document.getElementById("pbusca2").oninput=e=>{busca=e.target.value.toLowerCase();draw();};
    document.querySelectorAll("[data-area]").forEach(b=>{b.onclick=()=>{area=b.dataset.area;pecaSel=null;draw();};});
    document.querySelectorAll("[data-peca]").forEach(b=>{b.onclick=()=>{pecaSel=b.dataset.peca;draw();};});
    if(pecaSel){
      const cp=document.getElementById("pccopy");
      const gm=document.getElementById("pcgemia");
      if(cp)cp.onclick=()=>{navigator.clipboard?.writeText(document.getElementById("pcedit").value);alert("Modelo copiado!");};
      if(gm)gm.onclick=async()=>{
        const modelo=document.getElementById("pcedit").value;
        const det=prompt("Descreva os dados do caso (partes, fatos, valores):");
        if(!det)return;
        gm.textContent="Gerando...";
        try{
          const r=await apiIA("Você é advogado especialista. Preencha o modelo de peça processual com os dados fornecidos, mantendo a estrutura jurídica formal. Retorne apenas a peça completa.",
            [{role:"user",content:`MODELO:
${modelo}

DADOS DO CASO:
${det}`}]);
          document.getElementById("pcedit").value=r;
        }catch(e){alert("Erro: "+e.message);}
        gm.textContent="🤖 Personalizar com IA";
      };
    }
  }
  draw();
}

function pgWhatsApp(el){
  let waStatus="desconectado",waQR=null;
  const socket=typeof io!=="undefined"?io():null;
  if(socket){
    socket.on("wa_status",data=>{waStatus=data.status;waQR=data.qr;draw();});
  }
  async function checkStatus(){
    try{const r=await fetch("/api/whatsapp/status");const d=await r.json();waStatus=d.status;waQR=d.qr;draw();}catch(e){}
  }
  async function iniciar(){
    await fetch("/api/whatsapp/iniciar",{method:"POST"});waStatus="aguardando_qr";draw();
  }
  async function parar(){
    await fetch("/api/whatsapp/parar",{method:"POST"});waStatus="desconectado";waQR=null;draw();

    const cor=waStatus==="conectado"?C.green:waStatus==="aguardando_qr"?C.orange:C.gray;

        ${waQR?`<div style="text-align:center;margin-bottom:14px;">

        </div>`:""}
        <div style="display:flex;gap:7px;flex-wrap:wrap;">

        <div id="wa-qr-box" style="margin-top:12px;"></div>
      </div>
      <div style="display:flex;gap:8px;">
        <button id="wa-iniciar" style="flex:1;padding:10px;background:${C.gold};color:${C.navy};border:none;border-radius:8px;font-weight:700;cursor:pointer;">▶ Conectar</button>
        <button id="wa-parar" style="flex:1;padding:10px;background:rgba(192,57,43,.1);color:${C.red};border:1px solid rgba(192,57,43,.2);border-radius:8px;font-weight:700;cursor:pointer;">⏹ Desconectar</button>
      </div>
    </div>
    <div style="background:#fff;border-radius:11px;border:1px solid ${C.gray2};padding:20px;">
      <div style="font-size:13px;font-weight:700;color:${C.navy};margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid ${C.gray2};">📋 Como usar</div>
      <div style="font-family:sans-serif;font-size:12px;color:${C.text};line-height:2;">
        <div>1. Clique em <strong>Conectar</strong></div>
        <div>2. Escaneie o QR Code com o WhatsApp do escritório</div>
        <div>3. O bot responderá automaticamente a consultas</div>
      </div>
      <div style="margin-top:14px;padding:12px;background:rgba(201,168,76,.08);border-radius:8px;">
        <div style="font-size:11px;font-weight:700;color:${C.gold3};margin-bottom:8px;">COMANDOS DO BOT:</div>
        ${[
          ["/juridico [dúvida]", "Consulta jurídica com IA"],
          ["/adv [dúvida]", "Alternativa ao /juridico"],
          ["Oi HJADV", "Menu de boas-vindas"],
          ["Olá HJADV", "Menu de boas-vindas"]
        ].map(([cmd, desc]) => `
        <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(201,168,76,.15);">
          <code style="font-size:11px;color:${C.navy};background:${C.gray2};padding:2px 6px;border-radius:4px;">${cmd}</code>
          <span style="font-size:11px;color:${C.gray};">${desc}</span>
        </div>`).join("")}
      </div>
      <div style="margin-top:12px;padding:10px;background:rgba(26,122,74,.08);border-radius:8px;font-family:sans-serif;font-size:11px;color:${C.green};line-height:1.6;">
        ✅ O bot responde 24h automaticamente usando a IA Gemini integrada ao seu escritório.
      </div>
    </div>
  </div>`;

  // Socket.io para status em tempo real
  if (window._io_cap) { window._io_cap.disconnect(); }
  try {
    window._io_cap = io();
    window._io_cap.emit("wa_join", { cliente_id: SESS.cliente_id });
    window._io_cap.on("wa_status", ({ status, qr }) => atualizarStatusWA(status, qr));
  } catch(e) {}

  // Carregar status inicial
  fetch("/api/whatsapp/status", { headers: { "cliente_id": SESS.cliente_id, "token": SESS.token, "admin_email": SESS.admin_email||"", "admin_senha": SESS.admin_senha||"" } })
    .then(r => r.json()).then(d => atualizarStatusWA(d.status, d.qr)).catch(() => {});

  function atualizarStatusWA(status, qr) {
    const icon = document.getElementById("wa-icon");
    const txt = document.getElementById("wa-status-txt");
    const qrbox = document.getElementById("wa-qr-box");
    if (!icon) return;
    if (status === "conectado") {
      icon.textContent = "✅"; txt.textContent = "Conectado";
      txt.style.color = C.green; qrbox.innerHTML = "";
    } else if (status === "aguardando_qr" && qr) {
      icon.textContent = "📷"; txt.textContent = "Escaneie o QR Code";
      txt.style.color = C.navy;
      qrbox.innerHTML = `<div style="font-family:sans-serif;font-size:11px;color:${C.gray};margin-bottom:8px;">Abra o WhatsApp → Menu → Aparelhos conectados → Conectar aparelho</div><img src="${qr}" style="width:180px;height:180px;border-radius:8px;" onerror="this.style.display='none'"/>`;
    } else {
      icon.textContent = "📵"; txt.textContent = "Desconectado";
      txt.style.color = C.gray; qrbox.innerHTML = "";
    }
  }

  document.getElementById("wa-iniciar").onclick = async () => {
    document.getElementById("wa-iniciar").textContent = "Conectando...";
    try {
      await fetch("/api/whatsapp/iniciar", { method: "POST", headers: { "cliente_id": SESS.cliente_id, "token": SESS.token, "admin_email": SESS.admin_email||"", "admin_senha": SESS.admin_senha||"" } });
      document.getElementById("wa-status-txt").textContent = "Aguardando QR...";
    } catch(e) { alert("Erro ao conectar."); }
    document.getElementById("wa-iniciar").textContent = "▶ Conectar";
  };

  document.getElementById("wa-parar").onclick = async () => {
    await fetch("/api/whatsapp/parar", { method: "POST", headers: { "cliente_id": SESS.cliente_id, "token": SESS.token, "admin_email": SESS.admin_email||"", "admin_senha": SESS.admin_senha||"" } });
  };
}

function pgClientes(el) {
  let busca = "", clienteSel = null, aba = "lista";

  function draw() {
    if (aba === "lista") drawLista();
    else if (aba === "ficha") drawFicha();
  }

  function drawLista() {
    const fil = (DB.clientes || []).filter(c =>
      !busca || c.nome.toLowerCase().includes(busca.toLowerCase()) ||
      (c.cpf || "").includes(busca) || (c.email || "").toLowerCase().includes(busca.toLowerCase())
    );
    el.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <div>
        <h1 style="font-size:22px;color:${C.navy};">👤 Clientes</h1>
        <p style="font-family:sans-serif;font-size:10px;color:${C.gray};margin-top:2px;">Cadastro e briefing dos clientes do escritório</p>
      </div>
      ${btn("+ Novo Cliente", "cli-novo")}
    </div>
    <div style="display:flex;gap:8px;margin-bottom:14px;">
      <input id="cli-busca" placeholder="Buscar por nome, CPF ou e-mail..." value="${busca}"
        style="flex:1;padding:9px 12px;border:1.5px solid ${C.gray2};border-radius:8px;font-size:13px;font-family:sans-serif;outline:none;"/>
    </div>
    ${fil.length === 0 ? `
    <div style="text-align:center;padding:40px;background:#fff;border-radius:11px;border:1px solid ${C.gray2};">
      <div style="font-size:36px;margin-bottom:10px;">👤</div>
      <div style="font-family:sans-serif;font-size:14px;color:${C.gray};">Nenhum cliente cadastrado ainda.</div>
      <div style="font-family:sans-serif;font-size:12px;color:${C.gray};margin-top:4px;">Clique em "+ Novo Cliente" para começar.</div>
    </div>` : `
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;">
      ${fil.map(c => {
        const procs = (DB.processos || []).filter(p => p.cli === c.nome).length;
        const briefs = (c.briefings || []).length;
        const statusC = c.status === "Ativo" ? C.green : c.status === "Inativo" ? C.gray : C.orange;
        return `
        <div data-cli="${c.id}" style="background:#fff;border-radius:11px;border:1px solid ${C.gray2};padding:18px;cursor:pointer;transition:.15s;"
          onmouseover="this.style.borderColor='${C.gold}'" onmouseout="this.style.borderColor='${C.gray2}'">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">
            <div style="width:40px;height:40px;border-radius:50%;background:${C.navy};display:flex;align-items:center;justify-content:center;font-size:16px;color:${C.gold};font-weight:800;flex-shrink:0;">
              ${c.nome.charAt(0).toUpperCase()}
            </div>
            <span style="background:${statusC}18;color:${statusC};border-radius:20px;padding:3px 10px;font-size:10px;font-weight:700;">${c.status || "Ativo"}</span>
          </div>
          <div style="font-size:14px;font-weight:700;color:${C.navy};margin-bottom:3px;">${c.nome}</div>
          <div style="font-family:sans-serif;font-size:11px;color:${C.gray};margin-bottom:8px;">${c.email || "—"} ${c.tel ? "· " + c.tel : ""}</div>
          <div style="display:flex;gap:8px;">
            <div style="flex:1;background:${C.cream};border-radius:6px;padding:6px;text-align:center;">
              <div style="font-size:16px;font-weight:800;color:${C.navy};">${procs}</div>
              <div style="font-size:9px;color:${C.gray};font-family:sans-serif;">Processos</div>
            </div>
            <div style="flex:1;background:${C.cream};border-radius:6px;padding:6px;text-align:center;">
              <div style="font-size:16px;font-weight:800;color:${C.navy};">${briefs}</div>
              <div style="font-size:9px;color:${C.gray};font-family:sans-serif;">Briefings</div>
            </div>
          </div>
        </div>`;
      }).join("")}
    </div>`}`;

    document.getElementById("cli-busca").oninput = e => { busca = e.target.value; drawLista(); };
    document.getElementById("cli-novo").onclick = () => abrirFormCliente(null, draw);
    document.querySelectorAll("[data-cli]").forEach(b => {
      b.onclick = () => {
        clienteSel = (DB.clientes || []).find(c => c.id == b.dataset.cli);
        aba = "ficha"; draw();
      };
    });
  }

  function drawFicha() {
    if (!clienteSel) { aba = "lista"; draw(); return; }
    const c = (DB.clientes || []).find(x => x.id === clienteSel.id) || clienteSel;
    const procs = (DB.processos || []).filter(p => p.cli === c.nome);
    const fins = (DB.financeiro || []).filter(f => f.cli === c.nome);
    const totalHon = fins.filter(f => f.valor > 0).reduce((a, f) => a + f.valor, 0);

    el.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px;">
      <button id="cli-voltar" style="padding:6px 12px;background:transparent;border:1.5px solid ${C.gray2};border-radius:7px;cursor:pointer;font-size:12px;">← Clientes</button>
      <div style="flex:1;">
        <h1 style="font-size:20px;color:${C.navy};">${c.nome}</h1>
        <p style="font-family:sans-serif;font-size:11px;color:${C.gray};">${c.area || "Área não definida"} · ${c.status || "Ativo"}</p>
      </div>
      <div style="display:flex;gap:6px;">
        ${btn("✏️ Editar", "cli-editar", "ghost")}
        ${btn("+ Briefing", "cli-novo-brief")}
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;margin-bottom:16px;">
      ${[
        {l:"Processos", v:procs.length, i:"📋"},
        {l:"Total Honorários", v:fmtR(totalHon), i:"💰"},
        {l:"Briefings", v:(c.briefings||[]).length, i:"📝"}
      ].map(x => `
      <div style="background:#fff;border-radius:9px;border:1px solid ${C.gray2};padding:12px 14px;display:flex;align-items:center;gap:9px;">
        <div style="width:32px;height:32px;border-radius:7px;background:${C.navy}18;display:flex;align-items:center;justify-content:center;font-size:15px;">${x.i}</div>
        <div><div style="font-size:15px;font-weight:800;color:${C.navy};">${x.v}</div><div style="font-size:9px;color:${C.gray};font-family:sans-serif;">${x.l}</div></div>
      </div>`).join("")}
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">

      <!-- DADOS DO CLIENTE -->
      ${card(`
        <div style="font-size:13px;font-weight:700;color:${C.navy};margin-bottom:12px;padding-bottom:7px;border-bottom:1px solid ${C.gray2};">📋 Dados do Cliente</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-family:sans-serif;font-size:12px;">
          ${[
            ["CPF/CNPJ", c.cpf||"—"],["E-mail", c.email||"—"],["Telefone", c.tel||"—"],
            ["Endereço", c.end||"—"],["Profissão", c.prof||"—"],["Como chegou", c.origem||"—"]
          ].map(([l,v]) => `<div><div style="font-size:10px;color:${C.gray};text-transform:uppercase;font-weight:700;margin-bottom:2px;">${l}</div><div style="color:${C.text};">${v}</div></div>`).join("")}
        </div>
        ${c.obs ? `<div style="margin-top:12px;padding:10px;background:${C.cream};border-radius:7px;font-family:sans-serif;font-size:12px;color:${C.text};line-height:1.6;"><strong>Observações:</strong> ${c.obs}</div>` : ""}
      `)}

      <!-- PROCESSOS VINCULADOS -->
      ${card(`
        <div style="font-size:13px;font-weight:700;color:${C.navy};margin-bottom:12px;padding-bottom:7px;border-bottom:1px solid ${C.gray2};">📋 Processos Vinculados</div>
        ${procs.length === 0
          ? `<div style="font-family:sans-serif;font-size:12px;color:${C.gray};text-align:center;padding:16px;">Nenhum processo vinculado.</div>`
          : procs.map(p => `
          <div style="padding:8px;background:${C.cream};border-radius:7px;margin-bottom:6px;">
            <div style="font-size:11px;font-weight:700;color:${C.navy};">${p.area} — ${p.status}</div>
            <div style="font-size:10px;color:${C.gray};font-family:sans-serif;margin-top:2px;">${p.num || "Nº não informado"}</div>
          </div>`).join("")}
      `)}
    </div>

    <!-- BRIEFINGS -->
    <div style="margin-top:14px;background:#fff;border-radius:11px;border:1px solid ${C.gray2};padding:20px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid ${C.gray2};">
        <div style="font-size:13px;font-weight:700;color:${C.navy};">📝 Briefings e Histórico do Caso</div>
        ${btn("+ Novo Briefing", "cli-novo-brief2")}
      </div>
      ${(c.briefings || []).length === 0
        ? `<div style="text-align:center;padding:24px;font-family:sans-serif;font-size:13px;color:${C.gray};">Nenhum briefing registrado. Clique em "+ Novo Briefing" para começar.</div>`
        : [...(c.briefings || [])].reverse().map((b, i) => `
        <div style="border:1px solid ${C.gray2};border-radius:9px;padding:14px;margin-bottom:10px;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
            <div>
              <div style="font-size:13px;font-weight:700;color:${C.navy};">${b.titulo}</div>
              <div style="font-size:10px;color:${C.gray};font-family:sans-serif;margin-top:2px;">${fmtD(b.data)} · ${b.tipo || "Anotação"}</div>
            </div>
            <button data-delbref="${b.id}" style="padding:3px 8px;background:rgba(192,57,43,.1);color:${C.red};border:1px solid rgba(192,57,43,.2);border-radius:5px;cursor:pointer;font-size:11px;">×</button>
          </div>
          <div style="font-family:sans-serif;font-size:12px;color:${C.text};line-height:1.7;white-space:pre-wrap;">${b.conteudo}</div>
          ${b.docs ? `<div style="margin-top:8px;padding:7px 10px;background:${C.cream};border-radius:6px;font-family:sans-serif;font-size:11px;color:${C.gray};"><strong>Documentos:</strong> ${b.docs}</div>` : ""}
        </div>`).join("")}
    </div>`;

    document.getElementById("cli-voltar").onclick = () => { aba = "lista"; draw(); };
    document.getElementById("cli-editar").onclick = () => abrirFormCliente(c, () => {
      clienteSel = (DB.clientes || []).find(x => x.id === c.id);
      drawFicha();
    });
    const btnBrief = document.getElementById("cli-novo-brief") || document.getElementById("cli-novo-brief2");
    [document.getElementById("cli-novo-brief"), document.getElementById("cli-novo-brief2")].forEach(b => {
      if (b) b.onclick = () => abrirFormBriefing(c, drawFicha);
    });
    document.querySelectorAll("[data-delbref]").forEach(b => {
      b.onclick = () => {
        if (!confirm("Excluir este briefing?")) return;
        const cli = DB.clientes.find(x => x.id === c.id);
        if (cli) cli.briefings = (cli.briefings || []).filter(bf => bf.id != b.dataset.delbref);
        saveDB(); drawFicha();
      };
    });
  }

  draw();
}

function abrirFormCliente(obj, cb) {
  const isEdit = !!obj;
  const body = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      ${inp("Nome Completo *", "fcli-nome", "text", obj?.nome || "")}
      ${inp("CPF / CNPJ", "fcli-cpf", "text", obj?.cpf || "", "000.000.000-00")}
      ${inp("E-mail", "fcli-email", "email", obj?.email || "")}
      ${inp("Telefone / WhatsApp", "fcli-tel", "text", obj?.tel || "", "(00) 00000-0000")}
      ${inp("Profissão", "fcli-prof", "text", obj?.prof || "")}
      ${sel("Como chegou ao escritório", "fcli-origem", ["Indicação","Instagram","Google","WhatsApp","Presencial","Site","Outro"], obj?.origem || "")}
    </div>
    ${inp("Endereço", "fcli-end", "text", obj?.end || "")}
    ${sel("Área do caso", "fcli-area", ["Civil","Penal","Família","Trabalhista","Trânsito","Administrativo","Previdenciário","Outros"], obj?.area || "")}
    ${sel("Status", "fcli-status", ["Ativo","Em negociação","Inativo","Encerrado"], obj?.status || "Ativo")}
    <div style="margin-bottom:11px;"><label style="display:block;font-size:10px;font-weight:700;color:${C.navy};margin-bottom:4px;font-family:sans-serif;text-transform:uppercase;">Observações Gerais</label><textarea id="fcli-obs" rows="3" style="width:100%;padding:8px 10px;border:1.5px solid ${C.gray2};border-radius:7px;font-size:12px;font-family:sans-serif;outline:none;resize:vertical;box-sizing:border-box;">${obj?.obs || ""}</textarea></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      ${btn("Cancelar", "fcli-cancl", "ghost")}
      ${btn(isEdit ? "Salvar" : "Cadastrar", "fcli-save")}
    </div>`;

  openModal(modal("fcliente", isEdit ? "Editar Cliente" : "Novo Cliente", body, 560));
  document.getElementById("fcli-cancl").onclick = () => document.getElementById("fcliente-overlay").remove();
  document.getElementById("fcli-save").onclick = () => {
    const nome = document.getElementById("fcli-nome").value.trim();
    if (!nome) return alert("Nome é obrigatório.");
    const dados = {
      nome, cpf: document.getElementById("fcli-cpf").value,
      email: document.getElementById("fcli-email").value,
      tel: document.getElementById("fcli-tel").value,
      prof: document.getElementById("fcli-prof").value,
      origem: document.getElementById("fcli-origem").value,
      end: document.getElementById("fcli-end").value,
      area: document.getElementById("fcli-area").value,
      status: document.getElementById("fcli-status").value,
      obs: document.getElementById("fcli-obs").value,
    };
    if (!DB.clientes) DB.clientes = [];
    if (isEdit) {
      const idx = DB.clientes.findIndex(x => x.id === obj.id);
      if (idx !== -1) DB.clientes[idx] = { ...DB.clientes[idx], ...dados };
    } else {
      DB.clientes.push({ id: uid(), ...dados, briefings: [], criado_em: new Date().toISOString().split("T")[0] });
    }
    saveDB();
    document.getElementById("fcliente-overlay").remove();
    cb();
  };
}

function abrirFormBriefing(cliente, cb) {
  const body = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      ${inp("Título do Briefing *", "fbrf-titulo", "text", "", "Ex: Primeira consulta, Reunião 10/04...")}
      ${inp("Data *", "fbrf-data", "date")}
    </div>
    ${sel("Tipo", "fbrf-tipo", ["Primeira consulta","Reunião","Atualização do caso","Documentos recebidos","Decisão judicial","Audiência","Anotação geral"], "Primeira consulta")}
    <div style="margin-bottom:11px;">
      <label style="display:block;font-size:10px;font-weight:700;color:${C.navy};margin-bottom:4px;font-family:sans-serif;text-transform:uppercase;">Conteúdo / Histórico *</label>
      <textarea id="fbrf-conteudo" rows="7" placeholder="Descreva o histórico do caso, o que foi discutido, decisões tomadas, próximos passos..." style="width:100%;padding:9px 10px;border:1.5px solid ${C.gray2};border-radius:7px;font-size:12px;font-family:sans-serif;outline:none;resize:vertical;box-sizing:border-box;line-height:1.6;"></textarea>
    </div>
    ${inp("Documentos recebidos/enviados", "fbrf-docs", "text", "", "Ex: RG, CPF, contrato de honorários, procuração...")}
    <div style="display:flex;gap:7px;margin-bottom:11px;">
      ${btn("🤖 Resumir com IA", "fbrf-ia", "ghost")}
      <div id="fbrf-ia-status" style="font-family:sans-serif;font-size:11px;color:${C.gray};padding:8px 0;"></div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      ${btn("Cancelar", "fbrf-cancl", "ghost")}
      ${btn("Salvar Briefing", "fbrf-save")}
    </div>`;

  openModal(modal("fbriefing", `📝 Briefing — ${cliente.nome}`, body, 560));
  document.getElementById("fbrf-cancl").onclick = () => document.getElementById("fbriefing-overlay").remove();

  document.getElementById("fbrf-ia").onclick = async () => {
    const conteudo = document.getElementById("fbrf-conteudo").value;
    if (!conteudo.trim()) return alert("Escreva o conteúdo primeiro.");
    document.getElementById("fbrf-ia-status").textContent = "Resumindo...";
    try {
      const r = await apiIA(
        "Você é assistente jurídico. Resuma e organize o briefing de forma profissional.",
        [{ role: "user", content: `Organize e resuma este briefing de atendimento jurídico:\n\n${conteudo}` }]
      );
      document.getElementById("fbrf-conteudo").value = r;
      document.getElementById("fbrf-ia-status").textContent = "✅ Resumido!";
    } catch (e) {
      document.getElementById("fbrf-ia-status").textContent = "❌ Erro: " + e.message;
    }
  };

  document.getElementById("fbrf-save").onclick = () => {
    const titulo = document.getElementById("fbrf-titulo").value.trim();
    const conteudo = document.getElementById("fbrf-conteudo").value.trim();
    const data = document.getElementById("fbrf-data").value;
    if (!titulo || !conteudo || !data) return alert("Título, data e conteúdo são obrigatórios.");
    if (!DB.clientes) DB.clientes = [];
    const cli = DB.clientes.find(x => x.id === cliente.id);
    if (!cli) return;
    if (!cli.briefings) cli.briefings = [];
    cli.briefings.push({
      id: uid(), titulo, data,
      tipo: document.getElementById("fbrf-tipo").value,
      conteudo, docs: document.getElementById("fbrf-docs").value
    });
    saveDB();
    document.getElementById("fbriefing-overlay").remove();
    cb();
  };
}

</script>
</body>
</html>
