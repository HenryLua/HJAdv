function fmtD(s){if(!s)return"";const p=s.split("-");return`${p[2]}/${p[1]}/${p[0]}`;}
function dias(s){return Math.ceil((new Date(s+"T12:00:00")-new Date())/86400000);}
function fmtR(n){return"R$ "+Number(n||0).toLocaleString("pt-BR",{minimumFractionDigits:2});}

// ═══ API IA — chama SEU backend ═══
async function apiIA(system, messages){
  const res = await fetch(API_URL, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({system, messages, max_tokens:2000})
  });
  const j = await res.json();
  if(j.error) throw new Error(j.error);
  return j.text;
}

      <label style="font-family:sans-serif;font-size:10px;font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase;display:block;margin-bottom:4px;">Usuário</label>
      <input id="lu" placeholder="login" style="width:100%;padding:10px 13px;background:rgba(255,255,255,.07);border:1.5px solid rgba(201,168,76,.2);border-radius:8px;color:#fff;font-family:sans-serif;font-size:14px;outline:none;box-sizing:border-box;"/>
    </div>
    <div style="margin-bottom:14px;text-align:left;">
      <label style="font-family:sans-serif;font-size:10px;font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase;display:block;margin-bottom:4px;">Senha</label>
      <input id="lp" type="password" placeholder="••••••" style="width:100%;padding:10px 13px;background:rgba(255,255,255,.07);border:1.5px solid rgba(201,168,76,.2);border-radius:8px;color:#fff;font-family:sans-serif;font-size:14px;outline:none;box-sizing:border-box;"/>
    </div>
    <button id="lbtn" style="width:100%;padding:12px;background:${C.gold};color:${C.navy};font-family:sans-serif;font-weight:800;font-size:14px;border-radius:8px;border:none;cursor:pointer;">Entrar</button>
    <div id="lerr" style="font-family:sans-serif;font-size:12px;color:#e74c3c;margin-top:8px;display:none;">Usuário ou senha incorretos.</div>
    <div style="margin-top:16px;padding-top:13px;border-top:1px solid rgba(255,255,255,.07);font-family:sans-serif;font-size:10px;color:rgba(255,255,255,.25);line-height:1.7;">
      Logins: admin${logins.length?", "+logins.join(", "):""}<br/>Senha padrão: 1234
    </div>
  </div></div>`;
}
function bindLogin(){
  const tentar=()=>{
    const u=document.getElementById("lu").value.trim().toLowerCase();
    const p=document.getElementById("lp").value;
    if(u==="admin"&&p===DB.adminPass){SESS={nome:"Administrador",role:"admin"};render();return;}
    const a=DB.advogados.find(x=>(x.login||"").toLowerCase()===u&&x.senha===p);
    if(a){SESS={nome:a.nome,role:"advogado"};render();return;}
    const e=DB.estagiarios.find(x=>(x.login||"").toLowerCase()===u&&x.senha===p);
    if(e){SESS={nome:e.nome,role:"estagiario"};render();return;}
    document.getElementById("lerr").style.display="block";
    setTimeout(()=>document.getElementById("lerr").style.display="none",3000);
  };
  document.getElementById("lbtn").onclick=tentar;
  document.getElementById("lp").onkeydown=e=>{if(e.key==="Enter")tentar();};
  document.getElementById("lu").onkeydown=e=>{if(e.key==="Enter")document.getElementById("lp").focus();};
}

function bindNav(){
  document.getElementById("sair").onclick=()=>{SESS=null;ABA="dashboard";render();};

}
function renderPage(){

function inp(label,id,type="text",val="",ph=""){return`<div style="margin-bottom:11px;"><label style="display:block;font-size:10px;font-weight:700;color:${C.navy};margin-bottom:4px;font-family:sans-serif;text-transform:uppercase;letter-spacing:.8px;">${label}</label><input id="${id}" type="${type}" value="${val||""}" placeholder="${ph||""}" style="width:100%;padding:8px 10px;border:1.5px solid ${C.gray2};border-radius:7px;font-size:13px;font-family:sans-serif;color:${C.text};outline:none;box-sizing:border-box;"/></div>`;}
function sel(label,id,opts,val=""){return`<div style="margin-bottom:11px;"><label style="display:block;font-size:10px;font-weight:700;color:${C.navy};margin-bottom:4px;font-family:sans-serif;text-transform:uppercase;letter-spacing:.8px;">${label}</label><select id="${id}" style="width:100%;padding:8px 10px;border:1.5px solid ${C.gray2};border-radius:7px;font-size:13px;font-family:sans-serif;color:${C.text};outline:none;background:#fff;box-sizing:border-box;"><option value="">—</option>${opts.map(o=>`<option value="${o}"${val===o?" selected":""}>${o}</option>`).join("")}</select></div>`;}

function pgDashboard(el){

  const pend=DB.prazos.filter(p=>!p.done);
  const ent=DB.financeiro.filter(f=>f.valor>0).reduce((a,f)=>a+f.valor,0);
  const sai=DB.financeiro.filter(f=>f.valor<0).reduce((a,f)=>a+Math.abs(f.valor),0);

  const prox=[...pend].sort((a,b)=>new Date(a.data)-new Date(b.data)).slice(0,5);
  el.innerHTML=`
  <h1 style="font-size:22px;color:${C.navy};margin-bottom:4px;">🏛 Painel Principal</h1>
  <p style="font-family:sans-serif;font-size:11px;color:${C.gray};margin-bottom:16px;">${new Date().toLocaleDateString("pt-BR",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}</p>

    ${stats.map(s=>`<div style="background:#fff;border-radius:9px;border:1px solid ${C.gray2};border-left:4px solid ${s.c};padding:12px 14px;display:flex;align-items:center;gap:9px;"><span style="font-size:20px;">${s.i}</span><div><div style="font-family:sans-serif;font-size:18px;font-weight:800;color:${s.c};line-height:1;">${s.v}</div><div style="font-family:sans-serif;font-size:9px;color:${C.gray};margin-top:1px;">${s.l}</div></div></div>`).join("")}
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;margin-bottom:16px;">

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">

      ${sel("Status","fpst",STATUS_PROC,p.status)}${sel("Advogado","fpadv",DB.advogados.map(a=>a.nome),p.adv)}
      ${inp("Valor da Causa","fpval","text",p.valor,"R$ 0,00")}${inp("Tribunal","fptrib","text",p.trib,"TJRS, TRT...")}
    </div>
    <div style="margin-bottom:11px;"><label style="display:block;font-size:10px;font-weight:700;color:${C.navy};margin-bottom:4px;font-family:sans-serif;text-transform:uppercase;">Descrição</label>
    <textarea id="fpdesc" rows="3" style="width:100%;padding:8px 10px;border:1.5px solid ${C.gray2};border-radius:7px;font-size:12px;font-family:sans-serif;outline:none;resize:vertical;box-sizing:border-box;">${p.desc||""}</textarea></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;">${btn("Cancelar","fpcancl","ghost")}${btn("Salvar","fpsave")}</div>`;
  openModal(modal("fproc",isNew?"Novo Processo":"Editar Processo",body,640));
  document.getElementById("fpcancl").onclick=()=>document.getElementById("fproc-overlay").remove();
  document.getElementById("fpsave").onclick=()=>{
    const cli=document.getElementById("fpcli").value;
    const num=document.getElementById("fpnum").value;
    if(!cli||!num)return alert("Cliente e número são obrigatórios.");
    const obj={id:p.id||uid(),cli,num,tip:document.getElementById("fptip").value,area:document.getElementById("fparea").value,status:document.getElementById("fpst").value,adv:document.getElementById("fpadv").value,valor:document.getElementById("fpval").value,trib:document.getElementById("fptrib").value,desc:document.getElementById("fpdesc").value};

function abrirEproc(cb){
  const body=`<p style="font-family:sans-serif;font-size:12px;color:${C.gray};margin-bottom:11px;line-height:1.6;">Cole o texto do andamento processual. A IA identifica o prazo e calcula a data limite.</p>
    <div style="margin-bottom:11px;"><textarea id="eptxt" rows="5" placeholder="Intimação para contestar no prazo de 15 dias..." style="width:100%;padding:8px 10px;border:1.5px solid ${C.gray2};border-radius:7px;font-size:12px;font-family:sans-serif;outline:none;resize:vertical;box-sizing:border-box;"></textarea></div>
    ${btn("Interpretar com IA","epinterp")}
    <div id="epres" style="display:none;background:${C.cream};border-radius:7px;padding:12px;margin-top:12px;"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:11px;">${btn("Cancelar","epcancl","ghost")}</div>`;
  openModal(modal("feproc","🤖 Interpretar eproc / esaj",body,580));
  document.getElementById("epcancl").onclick=()=>document.getElementById("feproc-overlay").remove();
  document.getElementById("epinterp").onclick=async()=>{
    const txt=document.getElementById("eptxt").value;if(!txt.trim())return;
    document.getElementById("epinterp").textContent="Interpretando...";
    try{
      const r=await apiIA("Analise o texto processual e retorne apenas JSON: {\"evento\":\"...\",\"prazo_dias\":N,\"data_limite\":\"YYYY-MM-DD\",\"prioridade\":\"Alta|Média|Baixa\",\"observacoes\":\"...\"}",
        [{role:"user",content:txt}]);
      const j=JSON.parse(r.replace(/```[a-z]*|```/g,"").trim());
      const epres=document.getElementById("epres");
      epres.style.display="block";
      epres.innerHTML=Object.entries(j).filter(([,v])=>v).map(([k,v])=>`<div style="margin-bottom:5px;"><span style="font-family:sans-serif;font-size:9px;font-weight:700;color:${C.gray};text-transform:uppercase;">${k.replace(/_/g," ")}: </span><span style="font-family:sans-serif;font-size:12px;">${v}</span></div>`).join("")+
        `<div style="margin-top:10px;">${btn("Usar estes dados","epusar")}</div>`;
      document.getElementById("epusar").onclick=()=>{document.getElementById("feproc-overlay").remove();abrirFormPrazoPreenchido(j,cb);};
    }catch(e){alert("Erro: "+e.message);}
    document.getElementById("epinterp").textContent="Interpretar com IA";
  };
}

      document.getElementById("dvstop").onclick=()=>{if(srRef)srRef.stop();document.getElementById("dvivo-icon").textContent="🎙️";document.getElementById("dvivo-st").textContent="Pronto";};
      document.getElementById("dvorg").onclick=async()=>{
        if(!vivoTxt.trim())return;const fmt=document.getElementById("dvfmt").value;
        document.getElementById("dvorg").textContent="Organizando...";
        try{const r=await apiIA("Organize no formato de "+fmtP(fmt)+".",[{role:"user",content:vivoTxt}]);document.getElementById("dvout").style.color=C.text;document.getElementById("dvout").textContent=r;vivoOut=r;}
        catch(e){document.getElementById("dvout").textContent="❌ "+e.message;}
        document.getElementById("dvorg").textContent="🤖 Organizar com IA";
      };
    }
  }

function pgIA(el){

      </div>

        <button id="iaclr" style="padding:6px 9px;border:1.5px solid ${C.gray2};border-radius:7px;background:transparent;cursor:pointer;font-size:11px;">🗑</button>
        ${btn("Enviar","iaenv")}
      </div>
    </div>`;
    const chat=document.getElementById("iachat");chat.scrollTop=chat.scrollHeight;
    document.querySelectorAll("[id^='ileg-']").forEach(el=>{el.onclick=()=>{const i=parseInt(el.id.replace("ileg-",""));iaSelLeg=iaSelLeg.includes(i)?iaSelLeg.filter(x=>x!==i):[...iaSelLeg,i];draw();};});
    document.querySelectorAll("[id^='idout-']").forEach(el=>{el.onclick=()=>{const i=parseInt(el.id.replace("idout-",""));iaSelDout=iaSelDout.includes(i)?iaSelDout.filter(x=>x!==i):[...iaSelDout,i];draw();};});
    document.querySelectorAll("[id^='isum-']").forEach(el=>{el.onclick=()=>{const i=parseInt(el.id.replace("isum-",""));iaSelSum=iaSelSum.includes(i)?iaSelSum.filter(x=>x!==i):[...iaSelSum,i];draw();};});
    document.getElementById("iaclr").onclick=()=>{iaMsgs=[{r:"bot",t:"Chat limpo. Como posso ajudar?"}];draw();};
    const enviar=async()=>{
      const txt=document.getElementById("iainp").value.trim();if(!txt)return;
      iaMsgs.push({r:"user",t:txt},{r:"bot",t:"⚙️ Consultando..."});
      document.getElementById("iainp").value="";draw();
      const legs=iaSelLeg.length?iaSelLeg.map(i=>LEGS[i]).join(", "):"toda a legislação brasileira";
      const douts=iaSelDout.length?iaSelDout.map(i=>DOUTS[i]).join(", "):"Nucci, Didier, Tartuce, Moraes";
      const sys=`Você é assistente jurídico do escritório HJ ADV (Rio Grande do Sul, Brasil). Responda em português.\nBase legal: ${legs}\nDoutrina: ${douts}\n${SSUM}${iaSelDout.length?"\n"+SDOUT:""}\nCite sempre o artigo específico da lei. Use **negrito** para pontos importantes.`;
      const hist=iaMsgs.filter(m=>m.t!=="⚙️ Consultando...").slice(0,-1).map(m=>({role:m.r==="user"?"user":"assistant",content:m.t}));
      try{const r=await apiIA(sys,[...hist,{role:"user",content:txt}]);iaMsgs[iaMsgs.length-1]={r:"bot",t:r};}
      catch(e){iaMsgs[iaMsgs.length-1]={r:"bot",t:"❌ Erro: "+e.message+"\n\nVerifique sua conexão e as configurações do servidor."};}
      draw();
    };
    document.getElementById("iaenv").onclick=enviar;
    document.getElementById("iainp").onkeydown=e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();enviar();}};
  }
  draw();
}

          </div>
          <textarea id="pcedit" rows="22" style="width:100%;padding:10px;border:1.5px solid ${C.gray2};border-radius:7px;font-size:12px;font-family:monospace;outline:none;resize:vertical;box-sizing:border-box;line-height:1.7;">${p.modelo}</textarea>`;
        })():`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;color:${C.gray};font-family:sans-serif;font-size:13px;"><span style="font-size:36px;margin-bottom:9px;">📄</span>Selecione um modelo à esquerda</div>`}
      </div>
    </div>`;
    document.getElementById("pbusca2").oninput=e=>{busca=e.target.value.toLowerCase();draw();};
    document.querySelectorAll("[data-area]").forEach(b=>{b.onclick=()=>{area=b.dataset.area;pecaSel=null;draw();};});
    document.querySelectorAll("[data-peca]").forEach(b=>{b.onclick=()=>{pecaSel=b.dataset.peca;draw();};});
    if(pecaSel){
      const cp=document.getElementById("pccopy");
      const gm=document.getElementById("pcgemia");
      if(cp)cp.onclick=()=>{navigator.clipboard?.writeText(document.getElementById("pcedit").value);alert("Modelo copiado!");};
      if(gm)gm.onclick=async()=>{
        const modelo=document.getElementById("pcedit").value;
        const det=prompt("Descreva os dados do caso (partes, fatos, valores):");
        if(!det)return;
        gm.textContent="Gerando...";
        try{
          const r=await apiIA("Você é advogado especialista. Preencha o modelo de peça processual com os dados fornecidos, mantendo a estrutura jurídica formal. Retorne apenas a peça completa.",
            [{role:"user",content:`MODELO:
${modelo}

DADOS DO CASO:
${det}`}]);
          document.getElementById("pcedit").value=r;
        }catch(e){alert("Erro: "+e.message);}
        gm.textContent="🤖 Personalizar com IA";
      };
    }
  }
  draw();
}

// ═══ BOT WHATSAPP ═══
function pgWhatsApp(el){
  let waStatus="desconectado",waQR=null;
  const socket=typeof io!=="undefined"?io():null;
  if(socket){
    socket.on("wa_status",data=>{waStatus=data.status;waQR=data.qr;draw();});
  }
  async function checkStatus(){
    try{const r=await fetch("/api/whatsapp/status");const d=await r.json();waStatus=d.status;waQR=d.qr;draw();}catch(e){}
  }
  async function iniciar(){
    await fetch("/api/whatsapp/iniciar",{method:"POST"});waStatus="aguardando_qr";draw();
  }
  async function parar(){
    await fetch("/api/whatsapp/parar",{method:"POST"});waStatus="desconectado";waQR=null;draw();
  }
  function draw(){
    const cor=waStatus==="conectado"?C.green:waStatus==="aguardando_qr"?C.orange:C.gray;
    const label=waStatus==="conectado"?"Conectado":waStatus==="aguardando_qr"?"Aguardando QR Code...":waStatus==="erro"?"Erro":"Desconectado";
    el.innerHTML=`
    <div style="margin-bottom:16px;"><h1 style="font-size:22px;color:${C.navy};">💬 Bot WhatsApp</h1><p style="font-family:sans-serif;font-size:11px;color:${C.gray};margin-top:2px;">Assistente jurídico automático no WhatsApp</p></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
      <div style="background:#fff;border-radius:11px;border:1px solid ${C.gray2};padding:20px;">
        <div style="font-family:sans-serif;font-size:13px;font-weight:600;color:${C.navy};margin-bottom:14px;">Status da conexão</div>
        <div style="display:flex;align-items:center;gap:9px;margin-bottom:16px;">
          <div style="width:11px;height:11px;border-radius:50%;background:${cor};flex-shrink:0;"></div>
          <span style="font-family:sans-serif;font-size:13px;font-weight:600;color:${cor};">${label}</span>
        </div>
        ${waQR?`<div style="text-align:center;margin-bottom:14px;">
          <p style="font-family:sans-serif;font-size:12px;color:${C.gray};margin-bottom:8px;">Abra o WhatsApp → Dispositivos vinculados → Escanear QR</p>
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(waQR)}" style="width:200px;height:200px;border-radius:8px;border:1px solid ${C.gray2};"/>
        </div>`:""}
        <div style="display:flex;gap:7px;flex-wrap:wrap;">
          ${waStatus!=="conectado"?`<button id="wainicio" style="padding:8px 16px;background:${C.gold};color:${C.navy};border:none;border-radius:7px;font-family:sans-serif;font-weight:700;font-size:12px;cursor:pointer;">▶ Conectar</button>`:""}
          ${waStatus==="conectado"?`<button id="waparar" style="padding:8px 16px;background:rgba(192,57,43,.1);color:${C.red};border:1px solid rgba(192,57,43,.2);border-radius:7px;font-family:sans-serif;font-weight:700;font-size:12px;cursor:pointer;">⏹ Desconectar</button>`:""}
          <button id="waatualizar" style="padding:8px 14px;background:transparent;color:${C.navy};border:1.5px solid ${C.gray2};border-radius:7px;font-family:sans-serif;font-weight:700;font-size:12px;cursor:pointer;">↻ Atualizar</button>
        </div>
      </div>
      <div style="background:#fff;border-radius:11px;border:1px solid ${C.gray2};padding:20px;">
        <div style="font-family:sans-serif;font-size:13px;font-weight:600;color:${C.navy};margin-bottom:11px;">Como funciona</div>
        <div style="font-family:sans-serif;font-size:12px;color:${C.gray};line-height:1.9;">
          <div>1. Clique em <strong>Conectar</strong></div>
          <div>2. Escaneie o QR Code com seu WhatsApp</div>
          <div>3. O bot começa a responder automaticamente</div>
          <div style="margin-top:10px;padding:10px;background:${C.cream};border-radius:7px;">
            <div style="font-weight:700;color:${C.navy};margin-bottom:5px;">Comandos aceitos:</div>
            <div><code style="background:rgba(0,0,0,.06);padding:1px 5px;border-radius:3px;">/juridico [consulta]</code></div>
            <div style="margin-top:3px;"><code style="background:rgba(0,0,0,.06);padding:1px 5px;border-radius:3px;">/adv [consulta]</code></div>
            <div style="margin-top:3px;"><code style="background:rgba(0,0,0,.06);padding:1px 5px;border-radius:3px;">Oi HJADV [consulta]</code></div>
          </div>
        </div>
      </div>
    </div>`;
    if(document.getElementById("wainicio"))document.getElementById("wainicio").onclick=iniciar;
    if(document.getElementById("waparar"))document.getElementById("waparar").onclick=parar;
    if(document.getElementById("waatualizar"))document.getElementById("waatualizar").onclick=checkStatus;
  }
  checkStatus();
}


// ── INICIAR ──
render();
</script>
